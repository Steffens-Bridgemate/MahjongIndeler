name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: |
          FILE="Tsump/AppVersion.cs"
          CURRENT=$(grep -oP '"\K[0-9]+\.[0-9]+' "$FILE")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          MINOR_NUM=$((10#$MINOR + 1))
          NEW_VERSION=$(printf "%d.%02d" "$MAJOR" "$MINOR_NUM")
          sed -i "s|\"$CURRENT\"|\"$NEW_VERSION\"|" "$FILE"
          echo "Bumped version from $CURRENT to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Tsump/AppVersion.cs
          git commit -m "Bump version [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Tsump/Tsump.csproj -c Release -o release

      - name: Set base path for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/MahjongIndeler/" />|' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
