<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tsumo!</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link href="Tsump.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.downloadFile = function (filename, contentBase64) {
            var link = document.createElement('a');
            link.download = filename;
            link.href = "data:application/json;base64," + contentBase64;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
        window.triggerFileInput = function (inputId) {
            document.getElementById(inputId).click();
        };
        window.focusElement = function (id) {
            var el = document.getElementById(id);
            if (el) el.focus();
        };
        window.openHtmlInNewTab = function (html) {
            var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };
        window.downloadHtmlFile = function (filename, html) {
            var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            var link = document.createElement('a');
            link.download = filename;
            link.href = URL.createObjectURL(blob);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        };
        window.copyToClipboard = function (html, plainText) {
            var htmlBlob = new Blob([html], { type: 'text/html' });
            var textBlob = new Blob([plainText], { type: 'text/plain' });
            var item = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
            return navigator.clipboard.write([item]);
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(function (reg) {
            // When a new service worker takes over, reload to get the latest version
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        });
    </script>
</body>

</html>
